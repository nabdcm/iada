<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>نبض — السكرتيرة</title>

  <link rel="manifest" href="/manifest-secretary.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="نبض سكرتيرة">
  <meta name="theme-color" content="#0863ba">
  <link rel="apple-touch-icon" href="/Logo_Nabd.svg">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Rubik", sans-serif;
      background: linear-gradient(135deg, #0863ba, #0558a8);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 80px; height: 80px;
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    .title { font-size: 22px; font-weight: 800; }
    .sub { font-size: 14px; opacity: .8; line-height: 1.6; max-width: 320px; }
    .btn {
      margin-top: 8px;
      background: #fff;
      color: #0863ba;
      border: none;
      border-radius: 14px;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,.2);
    }
    .btn:active { transform: scale(.97); }
    .hint {
      margin-top: 20px;
      font-size: 13px;
      opacity: .7;
      line-height: 1.7;
      max-width: 300px;
      background: rgba(255,255,255,.1);
      padding: 14px 18px;
      border-radius: 14px;
    }
    .hint b { opacity: 1; }
    .countdown { font-size: 12px; opacity: .6; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="logo">🏥</div>
  <div class="title">نبض — لوحة السكرتيرة</div>
  <div class="sub">هذه صفحة الدخول السريع للوحة السكرتيرة</div>

  <button class="btn" onclick="goNow()">الدخول للوحة السكرتيرة</button>

  <div class="hint">
    📌 لإضافتها كتطبيق على الشاشة الرئيسية:<br>
    اضغط زر <b>المشاركة</b> ↑ ثم <b>"إضافة إلى الشاشة الرئيسية"</b><br>
    <span class="countdown" id="cd"></span>
  </div>

  <script>
    function goNow() {
      window.location.replace("/secretary");
    }
    // عدّاد تنازلي 8 ثوانٍ ثم انتقال تلقائي — وقت كافٍ للإضافة للشاشة الرئيسية
    var secs = 8;
    var cdEl = document.getElementById("cd");
    function tick() {
      if (secs <= 0) { goNow(); return; }
      cdEl.textContent = "سيتم الدخول تلقائياً خلال " + secs + " ثانية";
      secs--;
      setTimeout(tick, 1000);
    }
    tick();
  </script>
</body>
</html>
